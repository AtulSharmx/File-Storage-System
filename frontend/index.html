<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>File Storage System</title>
<style>
  :root {
    --bg: #f3f4f6;
    --surface: #ffffff;
    --surface-hover: #f9fafb;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --accent-soft: #e0e7ff;
    --danger: #ef4444;
    --danger-hover: #fee2e2;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    padding: 56px 20px;
    min-height: 100vh;
  }

  .wrap { max-width: 800px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 40px; }
  h1 { font-size: 32px; font-weight: 800; margin: 0 0 8px 0; letter-spacing: -0.02em; }
  .subtitle { color: var(--text-muted); font-size: 14px; font-family: var(--mono); }
  .accent { color: var(--accent); }

  section {
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    transition: box-shadow 0.2s ease;
  }
  section:hover { box-shadow: var(--shadow-lg); }

  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  input[type="file"] { color: var(--text-muted); font-size: 14px; flex: 1; min-width: 160px; padding: 8px 0; }
  input[type="file"]::file-selector-button {
    background: var(--surface-hover); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 6px; margin-right: 12px;
    cursor: pointer; font-weight: 500; transition: all 0.2s ease;
  }
  input[type="file"]::file-selector-button:hover { background: var(--border); }

  input[type="text"], select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-size: 14px; box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
  }
  input[type="text"] { flex: 1; min-width: 140px; }
  input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  button {
    background: var(--accent); color: white; border: none; padding: 10px 20px;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    box-shadow: var(--shadow-sm); transition: all 0.2s ease;
  }
  button:hover { background: var(--accent-hover); transform: translateY(-1px); }
  button:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }

  button.ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  button.ghost:hover { border-color: #d1d5db; background: var(--surface-hover); }

  button.danger { background: var(--danger); }
  button.danger:hover { background: #dc2626; }

  button.danger-link { background: transparent; color: var(--danger); padding: 6px 12px; font-weight: 600; box-shadow: none; }
  button.danger-link:hover { background: var(--danger-hover); transform: none; }

  .status { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-top: 16px; min-height: 18px; }
  .status.ok { color: #10b981; }
  .status.err { color: var(--danger); }

  .algo-note {
    font-family: var(--mono); font-size: 12px; color: var(--accent); background: var(--accent-soft);
    display: inline-block; padding: 6px 12px; border-radius: 6px; margin-top: 16px; font-weight: 500;
  }

  .file-row {
    display: flex; align-items: center; gap: 16px; padding: 16px 12px;
    border-bottom: 1px solid var(--border); transition: background 0.15s ease;
  }
  .file-row:last-child { border-bottom: none; }
  .file-row:hover { background: var(--surface-hover); border-radius: 8px; }

  .file-name { flex: 1; font-size: 15px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-meta { font-family: var(--mono); font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; min-width: 180px; justify-content: flex-end; }
  
  .empty { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px 0; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1; }

  a.dl-link { color: var(--accent); font-size: 13px; font-weight: 600; text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: background 0.2s ease; }
  a.dl-link:hover { background: var(--accent-soft); }

  /* New Modal Styles */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal.hidden { display: none; }
  .modal-box {
    background: var(--surface); padding: 24px; border-radius: 12px;
    width: 90%; max-width: 400px; box-shadow: var(--shadow-lg); text-align: center;
  }
  .modal-box h3 { margin: 0 0 20px 0; font-size: 18px; font-weight: 600; }
  .modal-actions { display: flex; justify-content: center; gap: 12px; }

  /* New Toast Notification Styles */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #1f2937; color: white;
    padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-lg); z-index: 100; transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .toast.hidden { transform: translateY(100px); opacity: 0; pointer-events: none; }
  .toast.error { background: var(--danger); }
  .toast.success { background: #10b981; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>File Storage <span class="accent">System</span></h1>
    <div class="subtitle">upload · sort · search — backed by AWS S3</div>
  </header>

  <section>
    <div class="row">
      <input type="file" id="fileInput" />
      <button id="uploadBtn">Upload</button>
    </div>
    <div class="status" id="uploadStatus"></div>
  </section>

  <section>
    <div class="row">
      <select id="sortBy">
        <option value="name">Name</option>
        <option value="size">Size</option>
        <option value="date">Date</option>
      </select>
      <select id="sortOrder">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>
      <input type="text" id="searchBox" placeholder="Search files by name..." />
      <button class="ghost" id="clearSearch">Clear</button>
    </div>
    <div class="algo-note" id="algoNote">sorted via merge sort · O(n log n)</div>
  </section>

  <section>
    <div id="fileList">
      <div class="empty">Loading files...</div>
    </div>
  </section>

</div>

<div id="confirmModal" class="modal hidden">
  <div class="modal-box">
    <h3 id="modalText">Are you sure?</h3>
    <div class="modal-actions">
      <button class="ghost" id="modalCancel">Cancel</button>
      <button class="danger" id="modalConfirm">Delete</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
  // Fix #2: Smart API Base URL
  // Uses localhost if on your computer, otherwise uses your real website link.
  const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
  
  // ---> THIS IS THE LINE I CHANGED FOR YOU <---
  const API_BASE = isLocal ? "http://localhost:8000" : "https://file-storage-system-backend-6iuy.onrender.com";

  const fileInput = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");
  const uploadStatus = document.getElementById("uploadStatus");
  const sortBy = document.getElementById("sortBy");
  const sortOrder = document.getElementById("sortOrder");
  const searchBox = document.getElementById("searchBox");
  const clearSearch = document.getElementById("clearSearch");
  const fileListEl = document.getElementById("fileList");
  const algoNote = document.getElementById("algoNote");

  // Fix #3: Custom Toast Notification
  let toastTimer;
  function showToast(message, type = 'normal') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.add('hidden'), 3000);
  }

  // Fix #3: Custom Confirmation Pop-up
  function askConfirm(msg) {
    return new Promise(resolve => {
      const modal = document.getElementById('confirmModal');
      document.getElementById('modalText').textContent = msg;
      modal.classList.remove('hidden');

      document.getElementById('modalCancel').onclick = () => {
        modal.classList.add('hidden');
        resolve(false);
      };
      document.getElementById('modalConfirm').onclick = () => {
        modal.classList.add('hidden');
        resolve(true);
      };
    });
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }

  function formatDate(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
  }

  // Fix #1: Securely render files (No innerHTML for user data)
  function renderFiles(files) {
    fileListEl.innerHTML = ""; // Clear the list

    if (!files || files.length === 0) {
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty';
      emptyDiv.textContent = 'No files yet — upload something above.';
      fileListEl.appendChild(emptyDiv);
      return;
    }

    files.forEach(f => {
      const row = document.createElement('div');
      row.className = 'file-row';
      row.id = 'file-row-' + f.name.replace(/[^a-zA-Z0-9]/g, '-'); // Safe ID for removing later

      const nameDiv = document.createElement('div');
      nameDiv.className = 'file-name';
      nameDiv.textContent = f.name; // textContent protects against hackers

      const metaDiv = document.createElement('div');
      metaDiv.className = 'file-meta';
      
      const sizeSpan = document.createElement('span');
      sizeSpan.textContent = formatBytes(f.size);
      
      const dateSpan = document.createElement('span');
      dateSpan.textContent = formatDate(f.last_modified);
      
      metaDiv.appendChild(sizeSpan);
      metaDiv.appendChild(dateSpan);

      const dlLink = document.createElement('a');
      dlLink.className = 'dl-link';
      dlLink.href = '#';
      dlLink.textContent = 'download';
      dlLink.onclick = (e) => downloadFile(e, f.name);

      const delBtn = document.createElement('button');
      delBtn.className = 'danger-link';
      delBtn.textContent = 'delete';
      delBtn.onclick = () => deleteFile(f.name, row.id);

      row.appendChild(nameDiv);
      row.appendChild(metaDiv);
      row.appendChild(dlLink);
      row.appendChild(delBtn);

      fileListEl.appendChild(row);
    });
  }

  async function loadFiles() {
    algoNote.textContent = `sorted via merge sort · O(n log n) — by ${sortBy.value}, ${sortOrder.value}`;
    try {
      const res = await fetch(`${API_BASE}/files?sort_by=${sortBy.value}&order=${sortOrder.value}`);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      renderFiles(data.files);
    } catch (err) {
      fileListEl.innerHTML = '';
      const errDiv = document.createElement('div');
      errDiv.className = 'empty';
      errDiv.textContent = `Could not load files. Backend not running? (${err.message})`;
      fileListEl.appendChild(errDiv);
    }
  }

  async function doSearch() {
    const query = searchBox.value.trim();
    if (!query) { loadFiles(); return; }
    algoNote.textContent = `searched via linear search · O(n) — query: "${query}"`;
    try {
      const res = await fetch(`${API_BASE}/files/search?query=${encodeURIComponent(query)}`);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      renderFiles(data.results);
    } catch (err) {
      showToast(`Search failed: ${err.message}`, 'error');
    }
  }

  // Fix #4: Faster deletes. We just remove the row instead of reloading everything.
  async function deleteFile(name, rowId) {
    const isSure = await askConfirm(`Delete "${name}"? This can't be undone.`);
    if (!isSure) return;

    try {
      const res = await fetch(`${API_BASE}/files/${encodeURIComponent(name)}`, { method: "DELETE" });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      
      // Remove just the deleted row from the screen instantly
      document.getElementById(rowId).remove();
      showToast("File deleted successfully", "success");

      // If the list is empty now, show the empty message
      if (fileListEl.children.length === 0) {
        renderFiles([]);
      }

    } catch (err) {
      showToast(`Could not delete: ${err.message}`, 'error');
    }
  }

  async function downloadFile(event, name) {
    event.preventDefault();
    try {
      const res = await fetch(`${API_BASE}/files/${encodeURIComponent(name)}/download`);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      window.open(data.url, "_blank");
    } catch (err) {
      showToast(`Download link error: ${err.message}`, 'error');
    }
  }

  uploadBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) {
      showToast("Choose a file first.", "error");
      return;
    }
    uploadBtn.disabled = true;
    uploadStatus.textContent = "Uploading...";
    uploadStatus.className = "status";

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch(`${API_BASE}/upload`, { method: "POST", body: formData });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      
      uploadStatus.textContent = "";
      showToast("File uploaded!", "success");
      fileInput.value = "";
      loadFiles(); // Reload to show the new file sorted correctly
    } catch (err) {
      uploadStatus.textContent = "";
      showToast(`Upload failed: ${err.message}`, 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  });

  sortBy.addEventListener("change", loadFiles);
  sortOrder.addEventListener("change", loadFiles);
  searchBox.addEventListener("input", doSearch);
  clearSearch.addEventListener("click", () => { searchBox.value = ""; loadFiles(); });

  loadFiles();
</script>
</body>
</html>
